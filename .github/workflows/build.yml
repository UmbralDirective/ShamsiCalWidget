name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle wrapper
        run: |
          # دانلود gradle-wrapper.jar
          mkdir -p gradle/wrapper
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

          # ساخت gradlew script
          cat > gradlew << 'GRADLEW'
#!/bin/sh
APP_HOME="$(cd "$(dirname "$0")" && pwd)"
exec java -classpath "$APP_HOME/gradle/wrapper/gradle-wrapper.jar" \
  org.gradle.wrapper.GradleWrapperMain "$@"
GRADLEW
          chmod +x gradlew

          # تایید
          echo "gradlew: $(ls -lh gradlew)"
          echo "wrapper jar: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"

      - name: Download Vazirmatn fonts
        run: |
          mkdir -p app/src/main/res/font
          curl -L "https://github.com/rastikerdar/vazirmatn/releases/download/v33.003/vazirmatn-v33.003.zip" \
            -o vazirmatn.zip
          unzip -o vazirmatn.zip
          find . -name "Vazirmatn-Medium.ttf" | head -1 | xargs -I{} cp {} app/src/main/res/font/vazirmatn_medium.ttf
          find . -name "Vazirmatn-Bold.ttf"   | head -1 | xargs -I{} cp {} app/src/main/res/font/vazirmatn_bold.ttf
          ls -lh app/src/main/res/font/

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShamsiCalWidget-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
