name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew" \
            -o gradlew
          chmod +x gradlew

      - name: Build APKs
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: List APKs
        run: find app/build/outputs/apk/debug/ -name "*.apk" | sort

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" | head -20)
          else
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s")
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## تغییرات
            ${{ steps.changelog.outputs.CHANGELOG }}
          files: |
            app/build/outputs/apk/debug/*universal*.apk
            app/build/outputs/apk/debug/*arm64*.apk
            app/build/outputs/apk/debug/*v7a*.apk
